<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: linear-gradient(145deg, #f0f2f5 0%, #e8ecf1 30%, #f5f7fa 70%, #eef1f5 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .container { text-align: center; position: relative; z-index: 1; }

  .tagline {
    font-size: 15px; color: #6b7280; letter-spacing: 0.5px;
    margin-bottom: 16px; opacity: 0;
    animation: fadeUp 0.6s ease-out 0.2s forwards;
  }
  .title {
    font-size: 88px; font-weight: 800; color: #1a1a2e;
    letter-spacing: -2px; margin-bottom: 10px; line-height: 1;
    opacity: 0;
    animation: fadeUp 0.6s ease-out 0.4s forwards;
  }
  .subtitle {
    font-size: 20px; color: #4a5568; font-weight: 400;
    margin-bottom: 32px; opacity: 0;
    animation: fadeUp 0.6s ease-out 0.6s forwards;
  }
  .terminal {
    background: #1e1e2e; border-radius: 12px;
    width: 480px; margin: 0 auto 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 4px 12px rgba(0,0,0,0.1);
    opacity: 0;
    animation: fadeUp 0.8s ease-out 0.8s forwards;
  }
  .terminal-bar {
    display: flex; align-items: center;
    padding: 10px 14px; gap: 7px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot-red { background: #ff5f57; }
  .dot-yellow { background: #febc2e; }
  .dot-green { background: #28c840; }
  .terminal-title {
    flex: 1; text-align: center; color: #6b7280;
    font-size: 12px; margin-right: 33px;
  }
  .terminal-body {
    padding: 20px 24px 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 18px; color: #cdd6f4;
  }
  .prompt { color: #89b4fa; }
  .cmd { color: #cdd6f4; }
  .typed {
    color: #a6e3a1; font-weight: 600;
    border-right: 2px solid #cdd6f4;
    white-space: nowrap; overflow: hidden;
    width: 0;
    animation: typing 1.2s steps(12) 1.2s forwards, blink 0.6s step-end 1.2s infinite;
  }
  .pills {
    display: flex; gap: 10px; justify-content: center;
    margin-bottom: 24px;
  }
  .pill {
    padding: 7px 18px;
    border: 1.5px solid #d1d5db; border-radius: 24px;
    font-size: 13px; color: #374151; font-weight: 500;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(4px);
    opacity: 0;
    animation: popIn 0.4s ease-out forwards;
  }
  .pill:nth-child(1) { animation-delay: 2.0s; }
  .pill:nth-child(2) { animation-delay: 2.15s; }
  .pill:nth-child(3) { animation-delay: 2.3s; }
  .pill:nth-child(4) { animation-delay: 2.45s; }
  .pill:nth-child(5) { animation-delay: 2.6s; }
  .footer {
    font-size: 13px; color: #9ca3af; opacity: 0;
    animation: fadeUp 0.5s ease-out 2.8s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes typing {
    from { width: 0; }
    to { width: 12ch; }
  }
  @keyframes blink {
    50% { border-color: transparent; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="tagline">Visualize Math Better</div>
    <div class="title">3brown1blue</div>
    <div class="subtitle">Generate 3Blue1Brown-Style Animated Math Videos with AI</div>
    <div class="terminal">
      <div class="terminal-bar">
        <div class="dot dot-red"></div>
        <div class="dot dot-yellow"></div>
        <div class="dot dot-green"></div>
        <div class="terminal-title">Terminal</div>
      </div>
      <div class="terminal-body">
        <span class="prompt">&#x276F;_</span> <span class="cmd">pip install </span><span class="typed">3brown1blue</span>
      </div>
    </div>
    <div class="pills">
      <div class="pill">Claude Code</div>
      <div class="pill">Cursor</div>
      <div class="pill">Windsurf</div>
      <div class="pill">Codex</div>
      <div class="pill">GitHub Copilot</div>
    </div>
    <div class="footer">by Amit Subhash</div>
  </div>
</body>
</html>
