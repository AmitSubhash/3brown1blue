<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1400px;
    height: 780px;
    background: linear-gradient(145deg, #f0f2f5 0%, #e8ecf1 30%, #f5f7fa 70%, #eef1f5 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    position: relative;
    overflow: hidden;
  }
  /* Subtle math grid background */
  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .container {
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .tagline {
    font-size: 16px;
    color: #6b7280;
    letter-spacing: 0.5px;
    margin-bottom: 20px;
    font-weight: 400;
  }
  .title {
    font-size: 96px;
    font-weight: 800;
    color: #1a1a2e;
    letter-spacing: -2px;
    margin-bottom: 12px;
    line-height: 1;
  }
  .subtitle {
    font-size: 22px;
    color: #4a5568;
    font-weight: 400;
    margin-bottom: 40px;
  }
  .terminal {
    background: #1e1e2e;
    border-radius: 12px;
    padding: 0;
    width: 520px;
    margin: 0 auto 36px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 4px 12px rgba(0,0,0,0.1);
  }
  .terminal-bar {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-red { background: #ff5f57; }
  .dot-yellow { background: #febc2e; }
  .dot-green { background: #28c840; }
  .terminal-title {
    flex: 1;
    text-align: center;
    color: #6b7280;
    font-size: 13px;
    margin-right: 36px;
  }
  .terminal-body {
    padding: 24px 28px 28px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 20px;
    color: #cdd6f4;
  }
  .prompt { color: #89b4fa; }
  .cmd { color: #cdd6f4; }
  .pkg { color: #a6e3a1; font-weight: 600; }
  .cursor {
    display: inline-block;
    width: 2px;
    height: 22px;
    background: #cdd6f4;
    vertical-align: text-bottom;
    margin-left: 2px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .pills {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 32px;
  }
  .pill {
    padding: 8px 20px;
    border: 1.5px solid #d1d5db;
    border-radius: 24px;
    font-size: 14px;
    color: #374151;
    font-weight: 500;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(4px);
  }
  .footer {
    font-size: 14px;
    color: #9ca3af;
    font-weight: 400;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="tagline">Visualize Math Better</div>
    <div class="title">3brown1blue</div>
    <div class="subtitle">Generate 3Blue1Brown-Style Animated Math Videos with AI</div>
    <div class="terminal">
      <div class="terminal-bar">
        <div class="dot dot-red"></div>
        <div class="dot dot-yellow"></div>
        <div class="dot dot-green"></div>
        <div class="terminal-title">Terminal</div>
      </div>
      <div class="terminal-body">
        <span class="prompt">&#x276F;_</span> <span class="cmd">pip install </span><span class="pkg">3brown1blue</span><span class="cursor"></span>
      </div>
    </div>
    <div class="pills">
      <div class="pill">Claude Code</div>
      <div class="pill">Cursor</div>
      <div class="pill">Windsurf</div>
      <div class="pill">Codex</div>
      <div class="pill">GitHub Copilot</div>
    </div>
    <div class="footer">by Amit Subhash</div>
  </div>
</body>
</html>
